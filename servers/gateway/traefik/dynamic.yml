  # ── Services ─────────────────────────────────────────────
  services:

    # ── Phase 1 ────────────────────────────────────────────

    homeassistant:
      loadBalancer:
        servers:
          - url: "http://{{GATEWAY_IP}}:8123"

    uptime-kuma:
      loadBalancer:
        servers:
          - url: "http://{{GATEWAY_IP}}:3001"

    pihole:
      loadBalancer:
        servers:
          - url: "http://{{GATEWAY_IP}}:8053"

    grafana:
      loadBalancer:
        servers:
          - url: "http://{{AGENT_IP}}:3100"

