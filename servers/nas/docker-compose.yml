version: "3.9"

# ============================================================
# Storage Node — Synology NAS
# Document management via Paperless-NGX + AI tagging
# Deploy via Synology Container Manager or SSH docker compose
# ============================================================

networks:
  paperless:
    driver: bridge

volumes:
  paperless_db:
  paperless_redis:

services:
  # ── Paperless Database ─────────────────────────────────────
  paperless-db:
    image: postgres:16-alpine
    container_name: paperless-db
    restart: always
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}
    volumes:
      - paperless_db:/var/lib/postgresql/data
    networks:
      - paperless
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  paperless-redis:
    image: redis:7-alpine
    container_name: paperless-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - paperless_redis:/data
    networks:
      - paperless
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Paperless-NGX ──────────────────────────────────────────
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /volume1/paperless/data:/usr/src/paperless/data
      - /volume1/paperless/media:/usr/src/paperless/media
      - /volume1/paperless/consume:/usr/src/paperless/consume
      - /volume1/paperless/export:/usr/src/paperless/export
    environment:
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASSWORD}
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_URL: https://paperless.${DOMAIN}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_TIME_ZONE: ${TIMEZONE}
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_CONSUMER_POLLING: "30"
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_FILENAME_FORMAT: "{created_year}/{correspondent}/{title}"
      PAPERLESS_TASK_WORKERS: "2"
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
    networks:
      - paperless
    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── AI Auto-Tagging ────────────────────────────────────────
  paperless-ai:
    image: clusterzx/paperless-ai:latest
    container_name: paperless-ai
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      PAPERLESS_API_URL: "http://paperless-ngx:8000/api"
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
      AI_PROVIDER: "custom"
      CUSTOM_BASE_URL: "http://agent.home.local:4000/v1"
      CUSTOM_MODEL: "assistant"
      CUSTOM_API_KEY: "sk-placeholder"
      SCAN_INTERVAL: "300"
      ADD_AI_TAG: "true"
      PROCESS_PREDEFINED_DOCUMENTS: "true"
    networks:
      - paperless
    extra_hosts:
      - "agent.home.local:${AGENT_IP}"
    depends_on:
      paperless-ngx:
        condition: service_healthy
