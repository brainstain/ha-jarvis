# Prometheus scrape configuration for homelab AI agent cluster

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

scrape_configs:
  # ── Agent Node ───────────────────────────────────────────
  - job_name: "ollama-agent"
    static_configs:
      - targets: ["ollama-metrics:9091"]
    metrics_path: /metrics

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  - job_name: "litellm"
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics

  - job_name: "agent-orchestrator"
    static_configs:
      - targets: ["agent-orchestrator:8100"]
    metrics_path: /metrics

  - job_name: "node-agent"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "gpu-agent"
    static_configs:
      - targets: ["nvidia-gpu-exporter:9835"]

  # ── Inference Node ───────────────────────────────────────
  - job_name: "ollama-inference"
    static_configs:
      - targets: ["inference.home.local:9091"]

  - job_name: "node-inference"
    static_configs:
      - targets: ["inference.home.local:9100"]

  - job_name: "gpu-inference"
    static_configs:
      - targets: ["inference.home.local:9835"]

  # ── Gateway Node ─────────────────────────────────────────
  - job_name: "node-gateway"
    static_configs:
      - targets: ["gateway.home.local:9100"]
